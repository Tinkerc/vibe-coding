# Test configuration for Auth Service
# Uses H2 in-memory database for fast unit tests

spring:
  application:
    name: auth-service-test

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: openid,profile,email
          github:
            client-id: test-github-client-id
            client-secret: test-github-client-secret
            scope: read:user,user:email

jwt:
  secret: test-secret-key-for-jwt-token-generation-minimum-256-bits
  expiration: 3600000  # 1 hour in milliseconds
  refresh-expiration: 604800000  # 7 days in milliseconds

rate-limit:
  capacity: 100
  refill-tokens: 10
  refill-duration: 60  # seconds

logging:
  level:
    com.vibe.auth: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
